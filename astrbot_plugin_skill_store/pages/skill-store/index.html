<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SKILL Store</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);min-height:100vh;color:#2d3436}
.header{background:linear-gradient(135deg,#6c5ce7 0%,#a29bfe 100%);padding:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(108,92,231,0.3)}
.header-inner{max-width:1200px;margin:0 auto;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:22px;color:#fff;font-weight:700;display:flex;align-items:center;gap:10px}
.header-actions{display:flex;gap:10px}
.header-actions button{padding:8px 20px;border:1px solid rgba(255,255,255,0.3);border-radius:10px;background:rgba(255,255,255,0.15);color:#fff;font-size:13px;cursor:pointer;transition:all 0.2s;font-weight:500;backdrop-filter:blur(4px)}
.header-actions button:hover{background:rgba(255,255,255,0.25);border-color:rgba(255,255,255,0.5)}
.content{max-width:1200px;margin:0 auto;padding:24px}
@media(max-width:768px){.header-inner{padding:12px 16px}.header h1{font-size:18px}.content{padding:16px}}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <h1>SKILL Store</h1>
    <div class="header-actions">
      <input id="sq" placeholder="Search skills..." style="padding:7px 14px;border:1px solid rgba(255,255,255,0.3);border-radius:8px;background:rgba(255,255,255,0.15);color:#fff;font-size:13px;outline:none;width:200px;backdrop-filter:blur(4px)" onkeydown="if(event.key==='Enter')window.smartSearch()">
      <button onclick="window.smartSearch()" style="padding:7px 14px;border:1px solid rgba(255,255,255,0.3);border-radius:8px;background:rgba(255,255,255,0.2);color:#fff;font-size:13px;cursor:pointer;transition:all 0.2s">Search</button>
      <button onclick="window.refresh()">Refresh</button>
    </div>
  </div>
</div>
<div class="content">
  <div id="list"><div style="display:flex;justify-content:center;align-items:center;height:400px"><div style="width:48px;height:48px;border:4px solid #e0e0e0;border-top-color:#6c5ce7;border-radius:50%;animation:spin 0.8s linear infinite"></div></div></div>
  <div id="pagination"></div>
</div>
<script src="/api/plugin/page/bridge-sdk.js"></script>
<script src="./app.js"></script>
</body>
</html>
